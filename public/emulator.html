<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCT Trading Floor — Agent Emulator</title>
  <link rel="icon" href="/img/logo.jpeg" type="image/jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#08070c; --surface:#14121e; --surface2:#1a1726; --border:#2a2438; --border2:#1e1830;
      --fg:#f0e8df; --fg2:#9a8e80; --fg3:#6a5f52; --accent:#d4af37; --accent2:#e8c84a;
      --success:#34d399; --danger:#f43f5e; --info:#60a5fa; --warn:#fbbf24; --purple:#a78bfa;
      --wall:#1a1726; --wall2:#252035; --floor:#1c1a28; --floor2:#161422;
      --corridor:#0e0d14;
      --px-gold:#d4af37; --px-gold2:#e8c84a; --px-skin:#f0e8df; --px-skindk:#d4c4a8;
      --px-hair:#5a4a3a; --px-blue:#3b82f6; --px-green:#34d399; --px-red:#f43f5e;
      --px-purple:#a78bfa; --px-pants:#2a2438; --px-dark:#08070c; --px-glass:#93c5fd;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'IBM Plex Sans',sans-serif;color:var(--fg);background:var(--bg);min-height:100vh;overflow-x:hidden}

    /* ═══ HEADER ═══ */
    .hdr{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:6px 20px;background:rgba(8,7,12,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border2);gap:12px}
    .hdr-left{display:flex;align-items:center;gap:10px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 6px var(--success);animation:pulse 2s ease-in-out infinite}
    .dot.off{background:var(--danger);box-shadow:0 0 6px var(--danger)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .hdr-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;color:var(--accent)}
    .hdr-center{display:flex;gap:20px}
    .hdr-stat{display:flex;flex-direction:column;align-items:center;gap:1px}
    .hdr-stat-l{font-size:.6rem;color:var(--fg3);text-transform:uppercase;letter-spacing:.5px}
    .hdr-stat-v{font-family:'JetBrains Mono',monospace;font-size:.8rem}
    .badge{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:600;padding:2px 8px;border-radius:99px;border:1px solid var(--border)}
    .badge.idle{color:var(--fg2)}.badge.running{color:var(--accent);border-color:var(--accent);background:rgba(212,175,55,.1)}
    .hdr-right{display:flex;align-items:center;gap:10px}
    .back-link{color:var(--fg2);text-decoration:none;font-size:.85rem}.back-link:hover{color:var(--accent)}
    .tbtn{background:0;border:1px solid var(--border);border-radius:99px;color:var(--fg3);padding:3px 12px;font-size:.75rem;cursor:pointer}
    .tbtn.on{border-color:var(--accent);color:var(--accent)}

    /* ═══ MAP CONTAINER ═══ */
    .map-wrap{padding:16px;display:flex;justify-content:center}
    .rpg-map{
      position:relative;width:100%;max-width:960px;aspect-ratio:48/36;
      background:var(--corridor);border:4px solid #333;border-radius:6px;
      image-rendering:pixelated;overflow:hidden;
      box-shadow:0 0 40px rgba(0,0,0,.6),inset 0 0 60px rgba(0,0,0,.3);
    }

    /* ═══ ROOMS ═══ */
    .rm{position:absolute;border:3px solid var(--wall2);border-radius:3px;overflow:hidden}
    .rm::before{content:attr(data-name);position:absolute;top:4px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:6px;color:rgba(255,255,255,.2);white-space:nowrap;z-index:2;pointer-events:none}
    /* Floor tile pattern */
    .rm::after{content:'';position:absolute;inset:0;opacity:.15;pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent,transparent 19px,rgba(255,255,255,.08) 19px,rgba(255,255,255,.08) 20px),
                 repeating-linear-gradient(90deg,transparent,transparent 19px,rgba(255,255,255,.08) 19px,rgba(255,255,255,.08) 20px)}

    /* Room positions */
    .rm-research{left:0%;top:0%;width:31%;height:39%;background:linear-gradient(135deg,#121828,#0f1520)}
    .rm-command{left:33%;top:0%;width:34%;height:39%;background:linear-gradient(135deg,#1a1520,#161020)}
    .rm-security{left:69%;top:0%;width:31%;height:39%;background:linear-gradient(135deg,#101820,#0c1418)}
    .rm-trading{left:0%;top:41%;width:31%;height:38%;background:linear-gradient(135deg,#1a1218,#160e14)}
    .rm-hall{left:33%;top:41%;width:34%;height:38%;background:linear-gradient(135deg,#14121e,#100e18);border-color:#333}
    .rm-accountant{left:69%;top:41%;width:31%;height:38%;background:linear-gradient(135deg,#151020,#110c1a)}
    .rm-resting{left:33%;top:81%;width:34%;height:18%;background:linear-gradient(135deg,#12100a,#0e0c08)}

    /* Door gaps — overlay strips that hide wall */
    .door{position:absolute;background:var(--corridor);z-index:3}
    /* Horizontal doors (between rows) */
    .door-h{height:8px;width:12%}
    /* Vertical doors (between columns) */
    .door-v{width:8px;height:12%}

    /* ═══ FURNITURE ═══ */
    .furn{position:absolute;border-radius:2px;z-index:1}
    .desk{background:#2a2020;border:1px solid #3a3030;width:10%;height:8%}
    .desk::after{content:'';position:absolute;top:1px;left:15%;width:35%;height:40%;background:var(--success);opacity:.4;border-radius:1px}
    .monitor{background:#1a1a2a;border:1px solid #2a2a4a;width:6%;height:5%}
    .monitor::after{content:'';position:absolute;inset:1px;background:var(--info);opacity:.25;border-radius:1px}
    .bookshelf{background:#2a2018;border:1px solid #3a3028;width:3%;height:18%}
    .bookshelf::after{content:'';position:absolute;top:10%;left:15%;right:15%;height:25%;background:var(--danger);opacity:.3;border-radius:1px}
    .chair{background:#1a1726;border:1px solid var(--border2);width:4%;height:4%;border-radius:50%}
    .bed{background:#2a2018;border:1px solid #3a3028;width:10%;height:6%;border-radius:3px}
    .bed::after{content:'';position:absolute;left:2px;top:2px;width:30%;height:60%;background:var(--fg3);opacity:.3;border-radius:2px}
    .shield-decor{background:var(--info);width:4%;height:5%;border-radius:2px 2px 50% 50%;opacity:.15;border:1px solid rgba(96,165,250,.2)}
    .chart-decor{background:var(--surface2);border:1px solid var(--border2);width:14%;height:10%}
    .chart-decor::after{content:'';position:absolute;bottom:2px;left:2px;right:2px;height:60%;
      background:linear-gradient(90deg,transparent 0%,var(--success) 20%,var(--success) 22%,transparent 22%,transparent 30%,var(--danger) 40%,var(--danger) 42%,transparent 42%,transparent 50%,var(--success) 60%,var(--success) 62%,transparent 62%,transparent 70%,var(--success) 80%,var(--success) 82%,transparent 82%);
      opacity:.3}
    .safe{background:#333;border:2px solid #555;width:5%;height:7%;border-radius:2px}
    .safe::after{content:'';position:absolute;top:35%;left:50%;transform:translateX(-50%);width:20%;height:25%;background:var(--accent);opacity:.3;border-radius:50%}

    /* ═══ PIXEL CHARACTERS ═══ */
    .agent-char{
      position:absolute;z-index:10;pointer-events:none;
      transition:left 3s ease-in-out,top 3s ease-in-out;
      image-rendering:pixelated;
    }
    .agent-char .pxs{width:3px;height:3px;background:transparent;transform:scale(2);transform-origin:bottom center}
    .agent-char .nametag{
      position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
      font-family:'Press Start 2P',monospace;font-size:4px;color:var(--fg3);white-space:nowrap;
      text-shadow:0 0 3px var(--bg),1px 1px 0 var(--bg);
    }
    .agent-char .lvltag{
      position:absolute;top:-10px;left:50%;transform:translateX(-50%);
      font-family:'Press Start 2P',monospace;font-size:4px;color:var(--accent);white-space:nowrap;
      text-shadow:0 0 4px rgba(212,175,55,.5);
    }
    /* Thought bubble */
    .agent-char .thought{
      position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
      font-family:'JetBrains Mono',monospace;font-size:5px;color:var(--fg);white-space:nowrap;
      background:rgba(20,18,30,.9);border:1px solid var(--border);border-radius:4px;padding:2px 4px;
      opacity:0;transition:opacity .5s;pointer-events:none;max-width:120px;overflow:hidden;text-overflow:ellipsis;
    }
    .agent-char .thought.show{opacity:1}
    .agent-char .thought::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:3px solid transparent;border-top-color:var(--border)}

    /* Walk animation */
    .agent-char.walking .pxs{animation:walk-bob .6s steps(2) infinite}
    .agent-char.idle .pxs{animation:idle-bob 2.5s ease-in-out infinite}
    .agent-char.working .pxs{animation:work-bob .4s steps(2) infinite;filter:drop-shadow(0 0 4px rgba(212,175,55,.4))}
    .agent-char.dizzy .pxs{animation:err-spin .5s ease-in-out infinite;filter:drop-shadow(0 0 3px rgba(244,63,94,.5))}
    .agent-char.asleep .pxs{opacity:.35;animation:none}
    .agent-char.asleep::before{content:'z z z';position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:4px;color:var(--fg3);animation:zzz 2s ease-in-out infinite;white-space:nowrap}
    @keyframes walk-bob{0%,100%{transform:scale(2) translateY(0)}50%{transform:scale(2) translateY(-3px)}}
    @keyframes idle-bob{0%,100%{transform:scale(2) translateY(0)}50%{transform:scale(2) translateY(-2px)}}
    @keyframes work-bob{0%,100%{transform:scale(2) translateY(0)}50%{transform:scale(2) translateY(-4px)}}
    @keyframes err-spin{0%,100%{transform:scale(2) rotate(0)}25%{transform:scale(2) rotate(6deg)}75%{transform:scale(2) rotate(-6deg)}}
    @keyframes zzz{0%,100%{opacity:.2;transform:translateX(-50%) translateY(0)}50%{opacity:.8;transform:translateX(-50%) translateY(-5px)}}

    /* ═══ PROFILE CARDS ═══ */
    .cards-wrap{padding:0 16px 16px}
    .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;max-width:960px;margin:0 auto}
    .card{background:rgba(17,15,24,.7);border:1px solid var(--border2);border-radius:10px;padding:12px;transition:border-color .2s;position:relative;overflow:hidden}
    .card:hover{border-color:var(--border)}.card.on{border-color:var(--accent);box-shadow:0 0 16px rgba(212,175,55,.15)}.card.err{border-color:var(--danger)}
    .card-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .card-av{width:36px;height:36px;background:var(--surface2);border-radius:6px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2);flex-shrink:0;position:relative;overflow:hidden;image-rendering:pixelated}
    .card-av .pxs{transform:scale(1.1);transform-origin:center;position:absolute;top:1px;left:3px}
    .card-info{flex:1;min-width:0}
    .card-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-role{font-size:.65rem;color:var(--fg3)}
    .card-st{font-family:'JetBrains Mono',monospace;font-size:.55rem;font-weight:600;padding:1px 5px;border-radius:99px;border:1px solid var(--border)}
    .card-st.running{color:var(--accent);border-color:var(--accent);background:rgba(212,175,55,.1)}
    .card-st.error{color:var(--danger);border-color:var(--danger)}
    .card-st.idle{color:var(--fg2)}
    .lvl-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
    .lvl-badge{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--accent);background:rgba(212,175,55,.1);padding:2px 5px;border-radius:3px;border:1px solid rgba(212,175,55,.15)}
    .xp-bar{flex:1;height:7px;background:var(--bg);border-radius:99px;overflow:hidden;border:1px solid var(--border2)}
    .xp-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s;min-width:1px}
    .xp-txt{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--fg3);white-space:nowrap}
    .card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
    .cs{text-align:center;padding:3px 0;background:var(--bg);border-radius:4px}
    .cs-v{font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:600}
    .cs-v.grn{color:var(--success)}.cs-v.gld{color:var(--accent)}
    .cs-l{font-size:.55rem;color:var(--fg3);text-transform:uppercase}
    .card-task{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--accent);display:flex;align-items:center;gap:4px;margin-bottom:4px}
    .card-task .td{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1s ease-in-out infinite}
    .card-act{font-size:.65rem;color:var(--fg2);max-height:44px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .card-act div{padding:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* ═══ FEED ═══ */
    .feed-wrap{padding:0 16px 24px}
    .feed{background:rgba(17,15,24,.7);border:1px solid var(--border2);border-radius:10px;padding:12px;max-width:960px;margin:0 auto}
    .feed-title{font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:600;color:var(--fg2);margin-bottom:8px}
    .feed-scroll{max-height:160px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .fe{display:flex;gap:6px;padding:2px 0;font-size:.7rem;color:var(--fg2);border-bottom:1px solid rgba(255,255,255,.02)}
    .fe-t{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--fg3);flex-shrink:0;width:48px}
    .fe-b{font-family:'JetBrains Mono',monospace;font-size:.5rem;font-weight:600;padding:0 3px;border-radius:2px;flex-shrink:0}
    .fe-b.b-coord{color:var(--accent);background:rgba(212,175,55,.1)}.fe-b.b-sent{color:var(--info);background:rgba(96,165,250,.1)}.fe-b.b-chart{color:var(--success);background:rgba(52,211,153,.1)}.fe-b.b-risk{color:var(--warn);background:rgba(251,191,36,.1)}.fe-b.b-trade{color:var(--accent);background:rgba(212,175,55,.1)}.fe-b.b-acct{color:var(--purple);background:rgba(167,139,250,.1)}.fe-b.b-tok{color:var(--fg2);background:var(--surface2)}
    .fe-m{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .placeholder{display:flex;justify-content:center;align-items:center;min-height:200px;color:var(--fg3);font-size:.85rem;text-align:center}
    .placeholder-icon{font-size:2rem;margin-bottom:10px;animation:pulse 2s ease-in-out infinite}

    @media(max-width:640px){.hdr-center{display:none}.rpg-map{aspect-ratio:4/4}.cards{grid-template-columns:1fr}}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <header class="hdr">
    <div class="hdr-left"><div class="dot" id="dot"></div><span class="hdr-title">MCT Trading Floor</span></div>
    <div class="hdr-center">
      <div class="hdr-stat"><span class="hdr-stat-l">Uptime</span><span class="hdr-stat-v" id="uptime">--</span></div>
      <div class="hdr-stat"><span class="hdr-stat-l">Cycles</span><span class="hdr-stat-v" id="cycles">--</span></div>
      <div class="hdr-stat"><span class="badge idle" id="stateBadge">IDLE</span></div>
    </div>
    <div class="hdr-right">
      <button class="tbtn on" id="autoBtn">Auto</button>
      <a href="/" class="back-link">&larr; Dashboard</a>
    </div>
  </header>

  <div class="map-wrap">
    <div class="rpg-map" id="rpgMap">
      <!-- Rooms -->
      <div class="rm rm-research" data-name="RESEARCH LAB"></div>
      <div class="rm rm-command" data-name="COMMAND CENTER"></div>
      <div class="rm rm-security" data-name="SECURITY"></div>
      <div class="rm rm-trading" data-name="TRADING ROOM"></div>
      <div class="rm rm-hall" data-name="MAIN HALL"></div>
      <div class="rm rm-accountant" data-name="ACCOUNTS"></div>
      <div class="rm rm-resting" data-name="REST AREA"></div>

      <!-- Doors -->
      <div class="door door-h" style="left:12%;top:calc(39% - 4px);"></div>
      <div class="door door-h" style="left:45%;top:calc(39% - 4px);"></div>
      <div class="door door-h" style="left:78%;top:calc(39% - 4px);"></div>
      <div class="door door-h" style="left:12%;top:calc(41% - 4px);"></div>
      <div class="door door-h" style="left:45%;top:calc(41% - 4px);"></div>
      <div class="door door-h" style="left:78%;top:calc(41% - 4px);"></div>
      <div class="door door-v" style="top:50%;left:calc(31% - 4px);"></div>
      <div class="door door-v" style="top:50%;left:calc(33% - 4px);"></div>
      <div class="door door-v" style="top:50%;left:calc(69% - 4px);"></div>
      <div class="door door-v" style="top:15%;left:calc(31% - 4px);"></div>
      <div class="door door-v" style="top:15%;left:calc(33% - 4px);"></div>
      <div class="door door-v" style="top:15%;left:calc(69% - 4px);"></div>
      <div class="door door-h" style="left:45%;top:calc(79% - 4px);"></div>
      <div class="door door-h" style="left:45%;top:calc(81% - 4px);"></div>

      <!-- Furniture — Research -->
      <div class="furn desk" style="left:6%;top:20%"></div>
      <div class="furn desk" style="left:18%;top:20%"></div>
      <div class="furn bookshelf" style="left:2%;top:14%"></div>
      <div class="furn chart-decor" style="left:14%;top:6%"></div>
      <!-- Furniture — Command -->
      <div class="furn desk" style="left:45%;top:16%;width:12%;height:6%"></div>
      <div class="furn monitor" style="left:47%;top:10%"></div>
      <div class="furn monitor" style="left:54%;top:10%"></div>
      <div class="furn chart-decor" style="left:40%;top:4%;width:18%"></div>
      <!-- Furniture — Security -->
      <div class="furn shield-decor" style="left:76%;top:5%"></div>
      <div class="furn shield-decor" style="left:82%;top:5%"></div>
      <div class="furn shield-decor" style="left:88%;top:5%"></div>
      <div class="furn desk" style="left:78%;top:20%"></div>
      <div class="furn monitor" style="left:80%;top:14%"></div>
      <!-- Furniture — Trading -->
      <div class="furn desk" style="left:5%;top:56%"></div>
      <div class="furn desk" style="left:16%;top:56%"></div>
      <div class="furn monitor" style="left:7%;top:50%"></div>
      <div class="furn monitor" style="left:18%;top:50%"></div>
      <div class="furn chart-decor" style="left:5%;top:44%"></div>
      <!-- Furniture — Accountant -->
      <div class="furn desk" style="left:78%;top:56%"></div>
      <div class="furn safe" style="left:90%;top:48%"></div>
      <div class="furn bookshelf" style="left:72%;top:44%"></div>
      <!-- Furniture — Resting -->
      <div class="furn bed" style="left:36%;top:86%"></div>
      <div class="furn bed" style="left:52%;top:86%"></div>
      <div class="furn chair" style="left:48%;top:92%"></div>

      <!-- Characters injected by JS -->
    </div>
  </div>

  <div class="cards-wrap"><div class="cards" id="profileCards"></div></div>
  <div class="feed-wrap"><div class="feed" id="feedBox"><div class="feed-title">&#x1F4E1; Live Activity</div><div class="feed-scroll" id="feedScroll"></div></div></div>

<script>
/* ═══════════════════════════════════════════
   AGENT DEFINITIONS
   ═══════════════════════════════════════════ */
const AGENTS = {
  coordinator:{name:'Coordinator',role:'Pipeline Boss',sprite:'sp-coord',tag:'BOSS',
    station:{x:50,y:22},room:'command'},
  sentiment:{name:'SentimentAgent',role:'Mood Analyst',sprite:'sp-sent',tag:'SENT',
    station:{x:10,y:26},room:'research'},
  chart:{name:'ChartAgent',role:'Signal Scanner',sprite:'sp-chart',tag:'SCAN',
    station:{x:22,y:26},room:'research'},
  risk:{name:'RiskAgent',role:'Risk Guard',sprite:'sp-risk',tag:'RISK',
    station:{x:82,y:26},room:'security'},
  trader:{name:'TraderAgent',role:'Trade Executor',sprite:'sp-trader',tag:'EXEC',
    station:{x:10,y:62},room:'trading'},
  accountant:{name:'AccountantAgent',role:'Trade Auditor',sprite:'sp-acct',tag:'ACCT',
    station:{x:82,y:62},room:'accountant'},
};

const ROOMS = {
  command:    {x:33,y:1,w:34,h:38},
  research:   {x:0,y:1,w:31,h:38},
  security:   {x:69,y:1,w:31,h:38},
  trading:    {x:0,y:41,w:31,h:38},
  hall:       {x:33,y:41,w:34,h:38},
  accountant: {x:69,y:41,w:31,h:38},
  resting:    {x:33,y:81,w:34,h:18},
};

/* ═══ CHARACTER STATE ═══ */
const chars = {};
let feedEntries = [];
let prevData = null;
let autoRefresh = true;
let pollTimer = null;

function randInRoom(room) {
  const r = ROOMS[room];
  return { x: r.x + 4 + Math.random() * (r.w - 8), y: r.y + 14 + Math.random() * (r.h - 18) };
}

function getTargetRoom(state) {
  if (state === 'running') return 'station';
  if (state === 'paused' || state === 'stopped') return 'resting';
  if (state === 'error') return 'station';
  return 'hall';
}

function getAnimClass(state) {
  if (state === 'running') return 'working';
  if (state === 'error') return 'dizzy';
  if (state === 'paused' || state === 'stopped') return 'asleep';
  return 'idle';
}

function getThought(agentData) {
  if (!agentData) return '';
  if (agentData.currentTask) return agentData.currentTask.description || '';
  const act = agentData.recentActivity;
  if (act && act.length > 0) return act[0].message || '';
  return '';
}

/* ═══ CREATE CHARACTER DOM ELEMENTS ═══ */
function initCharacters() {
  const map = document.getElementById('rpgMap');
  for (const [key, cfg] of Object.entries(AGENTS)) {
    const el = document.createElement('div');
    el.className = 'agent-char idle';
    el.id = 'char-' + key;
    el.style.left = cfg.station.x + '%';
    el.style.top = cfg.station.y + '%';
    el.innerHTML = `
      <div class="thought" id="thought-${key}"></div>
      <div class="lvltag" id="lvl-${key}">Lv1</div>
      <div class="pxs ${cfg.sprite}"></div>
      <div class="nametag">${cfg.tag}</div>
    `;
    map.appendChild(el);
    chars[key] = { el, x: cfg.station.x, y: cfg.station.y, targetRoom: 'station', wanderTimer: 0 };
  }
}

/* ═══ UPDATE CHARACTER POSITIONS ═══ */
function updateCharacter(key, agentData, cfg) {
  const now = Date.now();
  let ch = chars[key];

  // Dynamically create character if it doesn't exist (token agents)
  if (!ch) {
    const map = document.getElementById('rpgMap');
    const el = document.createElement('div');
    el.className = 'agent-char idle';
    el.id = 'char-' + key;
    const startPos = randInRoom('hall');
    el.style.left = startPos.x + '%';
    el.style.top = startPos.y + '%';
    const tag = key.replace('usdt','').toUpperCase().slice(0,4);
    el.innerHTML = `
      <div class="thought" id="thought-${key}"></div>
      <div class="lvltag" id="lvl-${key}">Lv1</div>
      <div class="pxs sp-token"></div>
      <div class="nametag">${tag}</div>
    `;
    map.appendChild(el);
    chars[key] = { el, x: startPos.x, y: startPos.y, targetRoom: 'hall', wanderTimer: 0 };
    ch = chars[key];
  }

  const state = agentData.state || 'idle';
  const targetRoom = getTargetRoom(state);

  // Update animation class
  ch.el.className = 'agent-char ' + getAnimClass(state);

  // Update level tag
  const rpg = agentData.rpg || {};
  const lvlEl = document.getElementById('lvl-' + key);
  if (lvlEl) lvlEl.textContent = 'Lv' + (rpg.level || 1);

  // Update thought bubble
  const thought = getThought(agentData);
  const thoughtEl = document.getElementById('thought-' + key);
  if (thoughtEl) {
    if (thought) {
      thoughtEl.textContent = thought.slice(0, 40);
      thoughtEl.classList.add('show');
    } else {
      thoughtEl.classList.remove('show');
    }
  }

  // Move to target
  if (targetRoom === 'station' && cfg.station) {
    ch.el.style.left = cfg.station.x + '%';
    ch.el.style.top = cfg.station.y + '%';
    ch.targetRoom = 'station';
  } else if (targetRoom === 'station' && !cfg.station) {
    // Token agents go to research room when working (their "station")
    const pos = randInRoom('research');
    ch.el.style.left = pos.x + '%';
    ch.el.style.top = pos.y + '%';
    ch.targetRoom = 'station';
  } else if (targetRoom !== ch.targetRoom || now - ch.wanderTimer > 5000) {
    const room = targetRoom === 'hall' ? 'hall' : 'resting';
    const pos = randInRoom(room);
    ch.el.style.left = pos.x + '%';
    ch.el.style.top = pos.y + '%';
    ch.targetRoom = targetRoom;
    ch.wanderTimer = now;

    if (state === 'idle') {
      ch.el.className = 'agent-char walking';
      setTimeout(() => {
        if (ch.el.className.includes('walking')) ch.el.className = 'agent-char idle';
      }, 3000);
    }
  }
}

function updateCharacters(healthData) {
  const agents = healthData.agents || {};

  // Core agents
  for (const [key, cfg] of Object.entries(AGENTS)) {
    const agentData = key === 'coordinator' ? healthData : agents[key];
    if (!agentData) continue;
    updateCharacter(key, agentData, cfg);
  }

  // Token agents (show top 12 on map)
  const tokenKeys = Object.keys(agents).filter(k => !Object.keys(AGENTS).includes(k) && k !== 'coordinator');
  tokenKeys.sort((a, b) => (agents[b]?.rpg?.level || 1) - (agents[a]?.rpg?.level || 1));
  for (const k of tokenKeys.slice(0, 12)) {
    updateCharacter(k, agents[k], { name: agents[k]?.name || k, sprite: 'sp-token' });
  }
}

/* ═══ WANDER IDLE AGENTS ═══ */
setInterval(() => {
  for (const [key, ch] of Object.entries(chars)) {
    if (ch.targetRoom === 'hall') {
      const pos = randInRoom('hall');
      ch.el.style.left = pos.x + '%';
      ch.el.style.top = pos.y + '%';
      ch.el.className = 'agent-char walking';
      ch.wanderTimer = Date.now();
      setTimeout(() => {
        if (ch.el.className.includes('walking')) ch.el.className = 'agent-char idle';
      }, 3000);
    }
    if (ch.targetRoom === 'resting') {
      // Sleeping agents stay put, just re-randomize occasionally
      if (Math.random() < 0.2) {
        const pos = randInRoom('resting');
        ch.el.style.left = pos.x + '%';
        ch.el.style.top = pos.y + '%';
      }
    }
  }
}, 6000);

/* ═══ PROFILE CARDS ═══ */
function esc(s) { const e = document.createElement('span'); e.textContent = s; return e.innerHTML; }
function fmtMoney(n) { if (!n) return '$0'; if (n >= 1000) return '$'+(n/1000).toFixed(1)+'k'; return '$'+n.toFixed(2); }

function renderCards(healthData) {
  const agents = healthData.agents || {};
  const container = document.getElementById('profileCards');
  let html = '';

  // Core agents
  for (const [key, cfg] of Object.entries(AGENTS)) {
    const d = key === 'coordinator' ? healthData : agents[key];
    if (!d) continue;
    html += renderCard(key, d, cfg);
  }

  // Token agents (top 12 by level)
  const tokenKeys = Object.keys(agents).filter(k => !Object.keys(AGENTS).includes(k) && k !== 'coordinator');
  tokenKeys.sort((a, b) => (agents[b]?.rpg?.level || 1) - (agents[a]?.rpg?.level || 1));
  for (const k of tokenKeys.slice(0, 12)) {
    html += renderCard(k, agents[k], {
      name: agents[k]?.name || k,
      role: (agents[k]?.name || k).replace('Agent','') + ' Specialist',
      sprite: 'sp-token',
    });
  }

  container.innerHTML = html;
}

function renderCard(key, d, cfg) {
  const state = d.state || 'stopped';
  const rpg = d.rpg || {};
  const lvl = rpg.level || 1;
  const xpProg = rpg.xpProgress || 0;
  const xpNext = rpg.xpForNext || 100;
  const xpCur = Math.round(xpProg * xpNext);
  const earned = rpg.totalEarned || 0;
  const tasks = rpg.tasksCompleted || 0;
  const rate = rpg.successRate || 0;
  const cls = state === 'running' ? ' on' : state === 'error' ? ' err' : '';
  const act = (d.recentActivity || []).slice(0, 2).map(a =>
    '<div>' + esc(a.message || '') + '</div>'
  ).join('') || '<div>No activity</div>';

  return `<div class="card${cls}">
    <div class="card-top">
      <div class="card-av"><div class="pxs ${cfg.sprite}"></div></div>
      <div class="card-info">
        <div class="card-name">${esc(cfg.name)}</div>
        <div class="card-role">${esc(cfg.role)}</div>
      </div>
      <span class="card-st ${state}">${state}</span>
    </div>
    <div class="lvl-row">
      <span class="lvl-badge">Lv.${lvl}</span>
      <div class="xp-bar"><div class="xp-fill" style="width:${Math.round(xpProg*100)}%"></div></div>
      <span class="xp-txt">${xpCur}/${xpNext}</span>
    </div>
    <div class="card-stats">
      <div class="cs"><div class="cs-v grn">${fmtMoney(earned)}</div><div class="cs-l">Earned</div></div>
      <div class="cs"><div class="cs-v gld">${tasks}</div><div class="cs-l">Tasks</div></div>
      <div class="cs"><div class="cs-v">${rate}%</div><div class="cs-l">Success</div></div>
    </div>
    ${d.currentTask ? `<div class="card-task"><div class="td"></div>${esc(d.currentTask.description||'')}</div>` : ''}
    <div class="card-act">${act}</div>
  </div>`;
}

/* ═══ LIVE FEED ═══ */
function updateFeed(activity) {
  if (!activity || !activity.length) return;
  for (const a of activity) {
    if (!feedEntries.find(e => e.ts === a.ts && e.message === a.message)) feedEntries.push(a);
  }
  feedEntries.sort((a, b) => a.ts - b.ts);
  if (feedEntries.length > 60) feedEntries = feedEntries.slice(-60);

  const scroll = document.getElementById('feedScroll');
  scroll.innerHTML = feedEntries.slice(-25).map(a => {
    const t = new Date(a.ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const n = (a.agent||'').toLowerCase();
    const bc = n.includes('coordinator')?'b-coord':n.includes('sentiment')?'b-sent':n.includes('chart')?'b-chart':n.includes('risk')?'b-risk':n.includes('trader')?'b-trade':n.includes('accountant')?'b-acct':'b-tok';
    const sn = (a.agent||'').replace('Agent','').slice(0,6);
    return `<div class="fe"><span class="fe-t">${t}</span><span class="fe-b ${bc}">${esc(sn)}</span><span class="fe-m">${esc(a.message||'')}</span></div>`;
  }).join('');
  requestAnimationFrame(() => { scroll.scrollTop = scroll.scrollHeight; });
}

/* ═══ HEADER ═══ */
function updateHeader(data) {
  const h = data.health || {};
  document.getElementById('uptime').textContent = formatUptime(data.uptime);
  document.getElementById('cycles').textContent = h.runCount ?? '--';
  const b = document.getElementById('stateBadge');
  const st = h.cycleRunning ? 'SCANNING' : (h.state || 'stopped').toUpperCase();
  b.textContent = st;
  b.className = 'badge ' + (h.cycleRunning ? 'running' : (h.state || 'idle'));
}

function formatUptime(s) {
  if (!s && s !== 0) return '--';
  const d = Math.floor(s/86400), h = Math.floor((s%86400)/3600), m = Math.floor((s%3600)/60);
  const p = []; if (d) p.push(d+'d'); p.push(h+'h',m+'m'); return p.join(' ');
}

/* ═══ DATA FETCH ═══ */
async function fetchData() {
  try {
    const res = await fetch('/api/admin/agents/health', { credentials: 'same-origin' });
    if (res.status === 401 || res.status === 403) {
      document.getElementById('profileCards').innerHTML = '<div class="placeholder"><div><div class="placeholder-icon">&#x1F512;</div><div>Log in on <a href="/" style="color:var(--accent)">dashboard</a> first</div></div></div>';
      stopPolling(); return;
    }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    document.getElementById('dot').classList.remove('off');
    prevData = data;

    updateHeader(data);
    updateCharacters(data.health || {});
    renderCards(data.health || {});
    updateFeed(data.activity);
  } catch (err) {
    console.error(err);
    document.getElementById('dot').classList.add('off');
  }
}

function startPolling() { pollTimer = setInterval(fetchData, 3000); fetchData(); }
function stopPolling() { clearInterval(pollTimer); pollTimer = null; }

document.getElementById('autoBtn').addEventListener('click', () => {
  autoRefresh = !autoRefresh;
  document.getElementById('autoBtn').classList.toggle('on', autoRefresh);
  if (autoRefresh) startPolling(); else stopPolling();
});

document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if (e.code==='Space') { e.preventDefault(); document.getElementById('autoBtn').click(); }
  if (e.code==='KeyS') {
    e.preventDefault();
    fetch('/api/admin/agents/command',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({command:'force-scan'})}).then(()=>fetchData()).catch(()=>{});
  }
});

/* ═══ INIT ═══ */
initCharacters();
startPolling();
</script>
</body>
</html>
