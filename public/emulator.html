<!DOCTYPE html>

  <meta name="description" content="MCT Trading Floor — Real-time AI agent visualization and control center.">
  <link rel="icon" href="/img/logo.jpeg" type="image/jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      --color-bg:          #08070c;
      --color-bg-raised:   #110f18;
      --color-bg-inset:    #0a0910;
      --color-surface:     #14121e;
      --color-surface-alt: #1a1726;
      --color-border:      #2a2438;
      --color-border-muted:#1e1830;
      --color-fg:          #f0e8df;
      --color-fg-muted:    #9a8e80;
      --color-fg-subtle:   #6a5f52;
      --color-accent:      #d4af37;
      --color-accent-fg:   #08070c;
      --color-accent-muted:rgba(212, 175, 55, 0.10);
      --color-accent-hover:#e8c84a;
      --color-accent-soft: rgba(212, 175, 55, 0.06);
      --color-success:     #34d399;
      --color-success-muted:rgba(52, 211, 153, 0.1);
      --color-danger:      #f43f5e;
      --color-danger-muted:rgba(244, 63, 94, 0.1);
      --color-warning:     #fbbf24;
      --color-info:        #60a5fa;
      --color-info-muted:  rgba(96, 165, 250, 0.1);
      --glow-gold:         0 0 16px rgba(212, 175, 55, 0.25), 0 0 48px rgba(212, 175, 55, 0.08);
      --glass-bg:          rgba(17, 15, 24, 0.7);
      --glass-border:      rgba(212, 175, 55, 0.06);
      --glass-blur:        16px;
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-5: 20px; --space-6: 24px; --space-8: 32px;
      --radius-sm: 4px; --radius-md: 8px; --radius-lg: 14px; --radius-xl: 20px; --radius-full: 9999px;
      --shadow-md:    0 4px 16px rgba(0,0,0,.6);
      --shadow-lg:    0 8px 32px rgba(0,0,0,.7);
      --font-display: 'Space Grotesk', system-ui, sans-serif;
      --font-body:    'IBM Plex Sans', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', 'Fira Code', monospace;
      --font-pixel:   'Press Start 2P', monospace;
      --text-xs: 0.75rem; --text-sm: 0.875rem; --text-base: 1rem;
      --text-lg: 1.125rem; --text-xl: 1.25rem; --text-2xl: 1.5rem;
      --z-base: 1; --z-dropdown: 10; --z-overlay: 30;
      --duration-fast: 120ms; --duration-normal: 250ms;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --px-dark:    #08070c;
      --px-surface: #14121e;
      --px-gold:    #d4af37;
      --px-gold-lt: #e8c84a;
      --px-skin:    #f0e8df;
      --px-skin-dk: #d4c4a8;
      --px-hair:    #5a4a3a;
      --px-shirt-b: #3b82f6;
      --px-shirt-g: #34d399;
      --px-shirt-r: #f43f5e;
      --px-shirt-p: #a78bfa;
      --px-pants:   #2a2438;
      --px-shield:  #60a5fa;
      --px-shield-g:#34d399;
      --px-glass:   #93c5fd;
      --px-white:   #f0e8df;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }
    body {
      font-family: var(--font-body);
      color: var(--color-fg);
      background: var(--color-bg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ============================================================
       HEADER
       ============================================================ */
    .header {
      position: sticky; top: 0; z-index: var(--z-overlay);
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-2) var(--space-5);
      background: rgba(8,7,12,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border-muted);
      gap: var(--space-4);
    }
    .header-left { display: flex; align-items: center; gap: var(--space-3); }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--color-success);
      box-shadow: 0 0 6px var(--color-success);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .live-dot.disconnected { background: var(--color-danger); box-shadow: 0 0 6px var(--color-danger); }
    @keyframes pulse-dot { 0%,100%{opacity:1}50%{opacity:0.4} }
    .header-title { font-family: var(--font-display); font-weight: 600; font-size: var(--text-lg); color: var(--color-accent); }
    .header-center { display: flex; gap: var(--space-5); }
    .header-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .header-stat-label { font-size: 0.65rem; color: var(--color-fg-subtle); text-transform: uppercase; letter-spacing: 0.5px; }
    .header-stat-value { font-family: var(--font-mono); font-size: var(--text-sm); color: var(--color-fg); }
    .state-badge {
      font-family: var(--font-mono); font-size: 0.65rem; font-weight: 600;
      padding: 2px 8px; border-radius: var(--radius-full);
      text-transform: uppercase; letter-spacing: 0.5px;
      border: 1px solid var(--color-border);
    }
    .state-badge.idle { color: var(--color-fg-muted); border-color: var(--color-border); }
    .state-badge.running { color: var(--color-accent); border-color: var(--color-accent); background: var(--color-accent-muted); }
    .state-badge.error { color: var(--color-danger); border-color: var(--color-danger); }
    .header-right { display: flex; align-items: center; gap: var(--space-3); }
    .back-link { color: var(--color-fg-muted); text-decoration: none; font-size: var(--text-sm); }
    .back-link:hover { color: var(--color-accent); }
    .toggle-btn {
      background: transparent; border: 1px solid var(--color-border); border-radius: var(--radius-full);
      color: var(--color-fg-subtle); padding: 3px 12px; font-size: var(--text-xs); cursor: pointer;
    }
    .toggle-btn.active { border-color: var(--color-accent); color: var(--color-accent); }
    .kbd { font-family: var(--font-mono); font-size: 0.6rem; background: var(--color-surface-alt); padding: 1px 5px; border-radius: 3px; border: 1px solid var(--color-border); }
    .kbd-hints { display: flex; gap: var(--space-3); font-size: 0.65rem; color: var(--color-fg-subtle); }

    /* ============================================================
       MAIN LAYOUT
       ============================================================ */
    .floor {
      padding: var(--space-5);
      display: flex; flex-direction: column; gap: var(--space-5);
      max-width: 1800px; margin: 0 auto;
    }

    /* ============================================================
       THE BIG HALL — All agents walk here
       ============================================================ */
    .trading-hall {
      position: relative;
      height: 220px;
      background:
        linear-gradient(180deg, var(--color-bg-inset) 0%, var(--color-surface) 100%),
        repeating-linear-gradient(90deg, transparent 0px, transparent 59px, var(--color-border-muted) 59px, var(--color-border-muted) 60px);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    /* Floor tiles */
    .trading-hall::before {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 40px;
      background: repeating-linear-gradient(
        90deg,
        var(--color-surface-alt) 0px, var(--color-surface-alt) 29px,
        var(--color-surface) 29px, var(--color-surface) 60px
      );
      border-top: 1px solid var(--color-border-muted);
      opacity: 0.5;
    }
    /* Desks in the background */
    .hall-desk {
      position: absolute; bottom: 42px;
      width: 40px; height: 20px;
      background: var(--color-surface-alt);
      border: 1px solid var(--color-border);
      border-radius: 3px 3px 0 0;
    }
    .hall-desk::after {
      content: '';
      position: absolute; top: 2px; left: 3px; right: 3px; height: 6px;
      background: var(--color-success); opacity: 0.3; border-radius: 1px;
    }
    /* Hall label */
    .hall-label {
      position: absolute; top: var(--space-3); left: var(--space-4);
      font-family: var(--font-pixel); font-size: 8px;
      color: var(--color-fg-subtle); opacity: 0.5;
      letter-spacing: 1px;
    }
    /* Pipeline progress bar at top of hall */
    .hall-pipeline {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; height: 24px;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid var(--color-border-muted);
    }
    .hall-stage {
      flex: 1; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-size: 0.6rem;
      color: var(--color-fg-subtle); border-right: 1px solid var(--color-border-muted);
      transition: all 0.3s;
    }
    .hall-stage:last-child { border-right: none; }
    .hall-stage.active { color: var(--color-accent); background: var(--color-accent-muted); }
    .hall-stage.done { color: var(--color-success); opacity: 0.7; }

    /* ============================================================
       PIXEL CHARACTERS IN HALL
       ============================================================ */
    .hall-char {
      position: absolute;
      bottom: 44px;
      z-index: var(--z-base);
      pointer-events: none;
      image-rendering: pixelated;
      transition: filter 0.3s;
    }
    .hall-char .pixel-sprite {
      width: 3px; height: 3px;
      background: transparent;
      transform: scale(2.5);
      transform-origin: bottom center;
      image-rendering: pixelated;
    }
    /* Name tag under character */
    .hall-char .char-nametag {
      position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
      font-family: var(--font-pixel); font-size: 5px;
      color: var(--color-fg-muted); white-space: nowrap;
      text-shadow: 0 0 3px var(--color-bg);
    }
    .hall-char .char-lvl {
      position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
      font-family: var(--font-pixel); font-size: 5px;
      color: var(--color-accent); white-space: nowrap;
      text-shadow: 0 0 4px rgba(212,175,55,0.5);
    }

    /* Walking animation — each agent gets a unique patrol via inline style animation */
    .hall-char.walking .pixel-sprite {
      animation: walk-step 0.8s steps(2) infinite;
    }
    .hall-char.idle-anim .pixel-sprite {
      animation: idle-breathe 2.5s ease-in-out infinite;
    }
    .hall-char.working .pixel-sprite {
      animation: work-bounce 0.4s steps(2) infinite;
      filter: drop-shadow(0 0 5px rgba(212,175,55,0.4));
    }
    .hall-char.error-anim .pixel-sprite {
      animation: dizzy 0.5s ease-in-out infinite;
      filter: drop-shadow(0 0 4px rgba(244,63,94,0.5));
    }
    .hall-char.sleeping .pixel-sprite {
      animation: none; opacity: 0.4;
    }
    .hall-char.sleeping::after {
      content: 'z z z'; position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
      font-family: var(--font-pixel); font-size: 5px; color: var(--color-fg-subtle);
      animation: zzz 2s ease-in-out infinite; white-space: nowrap;
    }

    @keyframes walk-step {
      0%,100% { transform: scale(2.5) translateY(0); }
      50% { transform: scale(2.5) translateY(-3px); }
    }
    @keyframes idle-breathe {
      0%,100% { transform: scale(2.5) translateY(0); }
      50% { transform: scale(2.5) translateY(-2px); }
    }
    @keyframes work-bounce {
      0%,100% { transform: scale(2.5) translateY(0); }
      50% { transform: scale(2.5) translateY(-4px); }
    }
    @keyframes dizzy {
      0%,100% { transform: scale(2.5) rotate(0deg); }
      25% { transform: scale(2.5) rotate(6deg); }
      75% { transform: scale(2.5) rotate(-6deg); }
    }
    @keyframes zzz {
      0%,100% { opacity: 0.3; transform: translateX(-50%) translateY(0); }
      50% { opacity: 0.8; transform: translateX(-50%) translateY(-5px); }
    }

    /* Patrol keyframes — generated per agent for variety */
    @keyframes patrol-1 { 0%{left:5%}25%{left:35%}50%{left:60%}75%{left:25%}100%{left:5%} }
    @keyframes patrol-2 { 0%{left:80%}30%{left:50%}60%{left:15%}100%{left:80%} }

    @keyframes patrol-7 { 0%{left:25%}50%{left:75%}100%{left:25%} }

    @keyframes patrol-fast-2 { 0%{left:80%}20%{left:30%}40%{left:70%}60%{left:10%}80%{left:60%}100%{left:80%} }
    @keyframes patrol-fast-3 { 0%{left:15%}25%{left:65%}50%{left:5%}75%{left:85%}100%{left:15%} }
    @keyframes patrol-fast-4 { 0%{left:60%}20%{left:5%}40%{left:75%}60%{left:30%}80%{left:90%}100%{left:60%} }
    @keyframes patrol-fast-5 { 0%{left:40%}30%{left:10%}60%{left:70%}100%{left:40%} }

      border-radius: var(--radius-md);

      font-size: 1.4rem;
      border: 1px solid var(--color-border-muted);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      image-rendering: pixelated;

      transform-origin: center;
      position: absolute; top: 2px; left: 4px;

    .card-name {

      font-family: var(--font-mono); font-size: 0.6rem; font-weight: 600;
      padding: 1px 6px; border-radius: var(--radius-full);
      border: 1px solid var(--color-border);

    .card-state.running { color: var(--color-accent); border-color: var(--color-accent); background: var(--color-accent-muted); }

       LIVE FEED
       ============================================================ */
    .live-feed {
      background: var(--glass-bg); border: 1px solid var(--color-border-muted);
      border-radius: var(--radius-lg); padding: var(--space-4);

      scrollbar-width: thin; scrollbar-color: var(--color-border) transparent;
    }

    .feed-badge.sentiment { color: var(--color-info); background: var(--color-info-muted); }
    .feed-badge.chart { color: var(--color-success); background: var(--color-success-muted); }
    .feed-badge.risk { color: var(--color-warning); background: rgba(251,191,36,0.1); }
    .feed-badge.trader { color: var(--color-accent); background: var(--color-accent-muted); }
    .feed-badge.accountant { color: #a78bfa; background: rgba(167,139,250,0.1); }
    .feed-badge.token { color: var(--color-fg-muted); background: var(--color-surface-alt); }

    .feed-msg { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

       ============================================================ */
    .placeholder {
      display: flex; justify-content: center; align-items: center;
      min-height: 300px; color: var(--color-fg-subtle);
      font-size: var(--text-sm); text-align: center;
    }
    .placeholder-icon { font-size: 2rem; margin-bottom: var(--space-3); animation: pulse-dot 2s ease-in-out infinite; }

    /* ============================================================
       Mobile
       ============================================================ */
    @media (max-width: 640px) {
      .floor { padding: var(--space-3); gap: var(--space-3); }
      .header-center { display: none; }
      .kbd-hints { display: none; }
      .trading-hall { height: 160px; }
      .hall-char .pixel-sprite { transform: scale(1.8); }
      .profiles-grid { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }

<body>
  <header class="header">
    <div class="header-left">
      <div class="live-dot" id="liveDot"></div>
      <span class="header-title">MCT Trading Floor</span>
    </div>
    <div class="header-center" id="headerCenter">
      <div class="header-stat">
        <span class="header-stat-label">Uptime</span>
        <span class="header-stat-value" id="uptimeValue">--</span>
      </div>
      <div class="header-stat">
        <span class="header-stat-label">Cycles</span>
        <span class="header-stat-value" id="cycleCount">--</span>
      </div>
      <div class="header-stat">
        <span class="state-badge idle" id="stateBadge">IDLE</span>
      </div>
    </div>
    <div class="header-right">
      <div class="kbd-hints">
        <span><span class="kbd">Space</span> Refresh</span>
        <span><span class="kbd">S</span> Scan</span>
      </div>
      <button class="toggle-btn active" id="autoRefreshBtn">Auto</button>
      <a href="/" class="back-link">&larr; Dashboard</a>
    </div>
  </header>

  <main class="floor" id="floorContainer">
    <div class="placeholder" id="loadingPlaceholder">
      <div>
        <div class="placeholder-icon">&#x1F4E1;</div>
        <div>Connecting to trading floor...</div>
      </div>
    </div>
  </main>

  <script>
    const POLL_INTERVAL = 3000;
    const MAX_FEED = 60;
    let isAutoRefresh = true;
    let pollTimer = null;
    let isConnected = false;
    let previousData = null;
    let feedEntries = [];

    /* ── Agent config ────────────────────────────────────── */
    const CORE_AGENTS = [
      { key: 'coordinator', name: 'Coordinator',   role: 'Pipeline Boss',    sprite: 'sprite-coordinator', icon: '\u{1F3DB}', patrol: 1 },
      { key: 'sentiment',   name: 'SentimentAgent', role: 'Mood Analyst',    sprite: 'sprite-sentiment',   icon: '\u{2696}',  patrol: 2 },
      { key: 'chart',       name: 'ChartAgent',     role: 'Signal Scanner',  sprite: 'sprite-chart',       icon: '\u{1F4CA}', patrol: 3 },
      { key: 'risk',        name: 'RiskAgent',      role: 'Risk Gatekeeper', sprite: 'sprite-risk',        icon: '\u{1F6E1}', patrol: 4 },
      { key: 'trader',      name: 'TraderAgent',    role: 'Trade Executor',  sprite: 'sprite-trader',      icon: '\u{1F4B0}', patrol: 5 },
      { key: 'accountant',  name: 'AccountantAgent',role: 'Trade Auditor',   sprite: 'sprite-accountant',  icon: '\u{1F4D1}', patrol: 6 },
    ];

    /* ── Helpers ─────────────────────────────────────────── */
    function formatUptime(s) {
      if (!s && s !== 0) return '--';
      const d = Math.floor(s/86400), h = Math.floor((s%86400)/3600), m = Math.floor((s%3600)/60);
      const p = []; if (d) p.push(d+'d'); p.push(h+'h', m+'m'); return p.join(' ');
    }
    function formatRelativeTime(ts) {
      if (!ts) return '--';
      const d = Date.now() - ts;
      if (d < 5000) return 'now';
      if (d < 60000) return Math.floor(d/1000)+'s';
      if (d < 3600000) return Math.floor(d/60000)+'m';
      return Math.floor(d/3600000)+'h';
    }
    function esc(s) { const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }
    function fmtMoney(n) {
      if (n == null || n === 0) return '$0';
      if (n >= 1000) return '$' + (n/1000).toFixed(1) + 'k';
      return '$' + n.toFixed(2);
    }
    function getBadgeClass(name) {
      const n = (name||'').toLowerCase();
      if (n.includes('coordinator')) return 'coordinator';
      if (n.includes('sentiment')) return 'sentiment';
      if (n.includes('chart')||n.includes('scanner')) return 'chart';
      if (n.includes('risk')) return 'risk';
      if (n.includes('trader')) return 'trader';
      if (n.includes('accountant')) return 'accountant';
      return 'token';
    }

    /* ── Hall characters ─────────────────────────────────── */
    function getAnimClass(state, isRunning) {
      if (isRunning || state === 'running') return 'working';
      if (state === 'error') return 'error-anim';
      if (state === 'paused' || state === 'stopped') return 'sleeping';
      return 'idle-anim';
    }
    function getPatrolStyle(idx, state, isRunning) {
      if (state === 'paused' || state === 'stopped') return `left: ${15 + idx * 12}%;`;
      const patrolName = (isRunning || state === 'running') ? `patrol-fast-${(idx % 6) + 1}` : `patrol-${(idx % 7) + 1}`;
      const dur = (isRunning || state === 'running') ? (5 + idx * 0.7) : (8 + idx * 1.5);
      return `animation: ${patrolName} ${dur.toFixed(1)}s ease-in-out infinite;`;
    }

    function renderHallCharacter(cfg, agentData, idx, isCycleRunning) {
      const state = agentData?.state || 'idle';
      const rpg = agentData?.rpg || {};
      const isRunning = isCycleRunning && state === 'running';
      const animCls = getAnimClass(state, isRunning);
      const patrolStyle = getPatrolStyle(idx, state, isRunning);
      const lvl = rpg.level || 1;

      return `<div class="hall-char ${animCls}" style="${patrolStyle}">
        <div class="char-lvl">Lv${lvl}</div>
        <div class="pixel-sprite ${cfg.sprite}"></div>
        <div class="char-nametag">${cfg.key === 'coordinator' ? 'BOSS' : cfg.key.slice(0,4).toUpperCase()}</div>
      </div>`;
    }

    /* ── Trading Hall ────────────────────────────────────── */
    function renderHall(health, agents) {
      const isCycleActive = health.cycleRunning;
      const taskDesc = (health.currentTask?.description || '').toLowerCase();
      const stages = ['Sentiment','Kronos','Scanner','Risk','Trader','Audit'];
      const activeStage = stages.findIndex(s => taskDesc.includes(s.toLowerCase()));

      // Core agent characters
      let chars = '';
      CORE_AGENTS.forEach((cfg, i) => {
        const data = cfg.key === 'coordinator' ? health : (agents[cfg.key] || {});
        chars += renderHallCharacter(cfg, data, i, isCycleActive);
      });

      // Token agent characters (show up to 8 in the hall)
      const tokenKeys = Object.keys(agents).filter(k =>
        !['sentiment','chart','risk','trader','accountant'].includes(k) && agents[k]?.rpg
      );
      tokenKeys.slice(0, 8).forEach((k, i) => {
        const data = agents[k];
        const lvl = data?.rpg?.level || 1;
        const state = data?.state || 'idle';
        const animCls = getAnimClass(state, isCycleActive);
        const patrolStyle = getPatrolStyle(6 + i, state, isCycleActive);
        chars += `<div class="hall-char ${animCls}" style="${patrolStyle}">
          <div class="char-lvl">Lv${lvl}</div>
          <div class="pixel-sprite sprite-token"></div>
          <div class="char-nametag">${k.slice(0,4).toUpperCase()}</div>
        </div>`;
      });

      // Background desks
      let desks = '';
      for (let d = 0; d < 6; d++) {
        desks += `<div class="hall-desk" style="left:${8 + d * 16}%;"></div>`;
      }

      return `
        <div class="trading-hall">
          <div class="hall-label">MCT TRADING FLOOR</div>
          <div class="hall-pipeline">
            ${stages.map((s, i) => {
              const cls = i === activeStage ? 'active' : (activeStage > i ? 'done' : '');
              return `<div class="hall-stage ${cls}">${s}</div>`;
            }).join('')}
          </div>
          ${desks}
          ${chars}
        </div>
      `;
    }

    /* ── Agent Profile Card ──────────────────────────────── */
    function renderAgentCard(key, agentData, cfg) {
      if (!agentData) return '';
      const state = agentData.state || 'stopped';
      const rpg = agentData.rpg || {};
      const lvl = rpg.level || 1;
      const xpProg = rpg.xpProgress || 0;
      const xpNext = rpg.xpForNext || 100;
      const xpCurrent = Math.round(xpProg * xpNext);
      const totalEarned = rpg.totalEarned || 0;
      const tasks = rpg.tasksCompleted || 0;
      const successRate = rpg.successRate || 0;
      const cardCls = state === 'running' ? 'is-running' : (state === 'error' ? 'is-error' : '');
      const spriteClass = cfg ? cfg.sprite : 'sprite-token';

      const activity = (agentData.recentActivity || []).slice(0, 3);
      const activityHtml = activity.map(a =>
        `<div class="card-activity-entry">${a.message || ''}</div>`
      ).join('') || '<div class="card-activity-entry">No activity yet</div>';

      const displayName = cfg ? cfg.name : agentData.name || key;
      const displayRole = cfg ? cfg.role : (agentData.name || key).replace('Agent','') + ' Specialist';

      return `
        <div class="agent-card ${cardCls}">
          <div class="card-header">
            <div class="card-avatar">
              <div class="pixel-sprite ${spriteClass}"></div>
            </div>
            <div class="card-info">
              <div class="card-name">${esc(displayName)}</div>
              <div class="card-role">${esc(displayRole)}</div>
            </div>
            <span class="card-state ${state}">${state}</span>
          </div>
          <div class="card-level-row">
            <span class="level-badge">Lv.${lvl}</span>
            <div class="xp-bar-wrap">
              <div class="xp-bar-fill" style="width:${Math.round(xpProg * 100)}%"></div>
            </div>
            <span class="xp-text">${xpCurrent}/${xpNext}</span>
          </div>
          <div class="card-stats">
            <div class="card-stat">
              <div class="card-stat-val earned">${fmtMoney(totalEarned)}</div>
              <div class="card-stat-label">Earned</div>
            </div>
            <div class="card-stat">
              <div class="card-stat-val accent">${tasks}</div>
              <div class="card-stat-label">Tasks</div>
            </div>
            <div class="card-stat">
              <div class="card-stat-val">${successRate}%</div>
              <div class="card-stat-label">Success</div>
            </div>
          </div>
          ${agentData.currentTask ? `<div class="card-current-task"><div class="task-dot"></div>${esc(agentData.currentTask.description)}</div>` : ''}
          <div class="card-activity">${activityHtml}</div>
        </div>
      `;
    }

    /* ── Live Feed ────────────────────────────────────────── */
    function renderFeed(activity) {
      if (activity && activity.length) {
        for (const a of activity) {
          if (!feedEntries.find(e => e.ts === a.ts && e.message === a.message)) {
            feedEntries.push(a);
          }
        }
        feedEntries.sort((a,b) => a.ts - b.ts);
        if (feedEntries.length > MAX_FEED) feedEntries = feedEntries.slice(-MAX_FEED);
      }

      const entries = feedEntries.slice(-30).map(a => {
        const t = new Date(a.ts);
        const time = t.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const badge = getBadgeClass(a.agent);
        const shortName = (a.agent||'').replace('Agent','').slice(0,6);
        return `<div class="feed-entry">
          <span class="feed-time">${time}</span>
          <span class="feed-badge ${badge}">${esc(shortName)}</span>
          <span class="feed-msg">${esc(a.message || '')}</span>
        </div>`;
      }).join('');

      return `
        <div class="live-feed">
          <div class="feed-title">&#x1F4E1; Live Activity</div>
          <div class="feed-scroll" id="feedScroll">${entries}</div>
        </div>
      `;
    }

    /* ── Full Render ─────────────────────────────────────── */
    function renderFloor(data) {
      const health = data.health || {};
      const agents = health.agents || {};
      const container = document.getElementById('floorContainer');

      // Header
      document.getElementById('uptimeValue').textContent = formatUptime(data.uptime);
      document.getElementById('cycleCount').textContent = health.runCount ?? '--';
      const stateBadge = document.getElementById('stateBadge');
      const displayState = health.cycleRunning ? 'SCANNING' : (health.state || 'stopped').toUpperCase();
      stateBadge.textContent = displayState;
      stateBadge.className = 'state-badge ' + (health.cycleRunning ? 'running' : (health.state || 'stopped'));

      // Core agent cards
      let coreCards = '';
      CORE_AGENTS.forEach(cfg => {
        const agentData = cfg.key === 'coordinator' ? health : agents[cfg.key];
        if (agentData) coreCards += renderAgentCard(cfg.key, agentData, cfg);
      });

      // Token agent cards (sorted by level desc)
      const tokenKeys = Object.keys(agents).filter(k =>
        !['sentiment','chart','risk','trader','accountant'].includes(k)
      );
      tokenKeys.sort((a, b) => {
        const la = agents[b]?.rpg?.level || 1;
        const lb = agents[a]?.rpg?.level || 1;
        return la - lb;
      });
      let tokenCards = '';
      for (const k of tokenKeys.slice(0, 20)) {
        tokenCards += renderAgentCard(k, agents[k], null);
      }

      container.innerHTML = [
        renderHall(health, agents),
        '<div class="profiles-grid">',
          coreCards,
          tokenCards,
        '</div>',
        renderFeed(data.activity),
      ].join('');

      requestAnimationFrame(() => {
        const feed = document.getElementById('feedScroll');
        if (feed) feed.scrollTop = feed.scrollHeight;
      });
    }

    /* ── Auth — uses same cookie auth as main dashboard ──── */
    function getAuthHeaders() {
      return {};
    }
    function getFetchOpts(extra = {}) {
      return { credentials: 'same-origin', ...extra };
    }

    /* ── Fetch ────────────────────────────────────────────── */
    async function fetchData() {
      try {
        const res = await fetch('/api/admin/agents/health', getFetchOpts());
        if (res.status === 401 || res.status === 403) {
          document.getElementById('floorContainer').innerHTML = `
            <div class="placeholder"><div>
              <div class="placeholder-icon">&#x1F512;</div>
              <div>Authentication Required</div>
              <div style="font-size:var(--text-sm);color:var(--color-fg-subtle);margin-top:var(--space-3);">
                <a href="/" style="color:var(--color-accent);">Log in</a> first.
              </div>
            </div></div>`;
          stopPolling();
          return;
        }
        if (!res.ok) throw new Error('HTTP ' + res.status);

        const data = await res.json();
        if (!isConnected) {
          isConnected = true;
          document.getElementById('liveDot').classList.remove('disconnected');
        }
        previousData = data;
        renderFloor(data);
      } catch (err) {
        console.error('Fetch error:', err);
        isConnected = false;
        document.getElementById('liveDot').classList.add('disconnected');
        if (!previousData) {
          document.getElementById('floorContainer').innerHTML = `
            <div class="placeholder"><div>
              <div class="placeholder-icon" style="color:var(--color-danger);">&#x26A0;</div>
              <div style="color:var(--color-danger);">Disconnected</div>
              <div style="font-size:var(--text-xs);color:var(--color-fg-subtle);">Retrying...</div>
            </div></div>`;
        }
      }
    }

    function startPolling() { pollTimer = setInterval(fetchData, POLL_INTERVAL); fetchData(); }
    function stopPolling() { clearInterval(pollTimer); pollTimer = null; }
    function toggleAutoRefresh() {
      isAutoRefresh = !isAutoRefresh;
      const btn = document.getElementById('autoRefreshBtn');
      btn.classList.toggle('active', isAutoRefresh);
      if (isAutoRefresh) startPolling(); else stopPolling();
    }

    /* ── Keyboard ────────────────────────────────────────── */
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'Space') { e.preventDefault(); toggleAutoRefresh(); }
      if (e.code === 'KeyS') {
        e.preventDefault();
        fetch('/api/admin/agents/command', getFetchOpts({
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ command: 'force-scan' }),
        })).then(() => fetchData()).catch(() => {});
      }
    });

    /* ── Init ────────────────────────────────────────────── */
    document.getElementById('autoRefreshBtn').addEventListener('click', toggleAutoRefresh);
    startPolling();
  </script>
</body>
</html>
