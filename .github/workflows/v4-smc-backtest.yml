name: v4-smc backtest

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Lookback days'
        required: false
        default: '30'
      syms:
        description: 'Symbols (comma-separated)'
        required: false
        default: 'BTCUSDT,ETHUSDT,BNBUSDT,ADAUSDT,SOLUSDT'

jobs:
  bt:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    env:
      TRACKING_ISSUE: ${{ vars.LOSS_BACKTEST_ISSUE || '70' }}
      DAYS: ${{ github.event.inputs.days }}
      SYMS: ${{ github.event.inputs.syms }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm install node-fetch@2 --no-save

      - name: Run backtest
        id: run
        run: |
          set +e
          export DAYS SYMS
          node backtest-v4-smc.js > /tmp/out.txt 2> /tmp/err.txt
          rc=$?
          {
            echo "## v4-smc backtest — $(date -u +'%Y-%m-%d %H:%M UTC') (${DAYS}d, ${SYMS})"
            echo ""
            if [ $rc -ne 0 ]; then
              echo '### Failed'
              echo '```'; tail -n 60 /tmp/err.txt; echo '```'
            fi
            echo "### Output"
            echo '```'
            tail -n 600 /tmp/out.txt
            echo '```'
          } > /tmp/comment.md
          { echo "BODY<<EOF"; cat /tmp/comment.md; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Post to issue
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ env.TRACKING_ISSUE }}
          body: ${{ steps.run.outputs.BODY }}
